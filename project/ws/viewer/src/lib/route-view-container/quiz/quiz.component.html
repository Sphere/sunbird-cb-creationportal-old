<div class="quiz-layout" *ngIf="quizData">
  <div id="fullScreenContainer" class="quiz-container">
    <ng-container *ngIf="isFetchingDataComplete">
      <viewer-plugin-quiz
        [identifier]="quizData?.identifier"
        [artifactUrl]="quizData?.artifactUrl"
        [name]="quizData?.name"
        [learningObjective]="quizData?.learningObjective"
        [complexityLevel]="quizData?.complexityLevel"
        [duration]="quizData?.duration"
        [quizJson]="quizJson"
        [collectionId]="collectionId">
      </viewer-plugin-quiz>
    </ng-container>
  </div>
  <div class="player-nav-links">
    <app-player-navigation-widget></app-player-navigation-widget>
  </div>
</div>
