<div class="pdf-layout" *ngIf="pdfData">
  <div id="fullScreenContainer" class="pdf-content-wrap">
    <ng-container *ngIf="isFetchingDataComplete" [wsResolverWidget]="widgetResolverPdfData"></ng-container>
  </div>
  <div class="player-nav-links">
    <app-player-navigation-widget></app-player-navigation-widget>
  </div>
  <div *ngIf="discussionForumWidget && isRestricted" class="discussion-section">
    <h2 class="discussion-head">Discussion Forum</h2>
    <ng-container [wsResolverWidget]="discussionForumWidget"></ng-container>
  </div>
</div>
