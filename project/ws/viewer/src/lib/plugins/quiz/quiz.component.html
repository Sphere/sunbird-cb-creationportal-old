<viewer-overview *ngIf="viewState === 'initial'" [learningObjective]="learningObjective"
  [complexityLevel]="complexityLevel" [duration]="duration" [timeLimit]="quizJson?.timeLimit"
  [noOfQuestions]="quizJson?.questions?.length" (userSelection)="overViewed($event)"></viewer-overview>

<div #quizContainer *ngIf="viewState !== 'initial'" class="quiz-container">
  <nav class="quiz-nav-bar">
    <div class="quiz-nav-left">
      <button class="quiz-nav-btn" aria-label="menu toggle" i18n-aria-label (click)="sidenav.toggle()">
        <mat-icon>menu</mat-icon>
      </button>
      <ws-widget-btn-fullscreen [widgetType]="'actionButton'" [widgetSubType]="'actionButtonFullscreen'"
        [widgetData]="{ fsContainer: quizContainer }"></ws-widget-btn-fullscreen>
    </div>
    <div class="quiz-nav-timer">
      <mat-icon class="timer-icon">alarm</mat-icon>
      <span class="timer-value" [class.submitted]="isSubmitted">{{ timeLeft | pipeDurationTransform: 'hms' }}</span>
      <span *ngIf="isSubmitted" class="submitted-tag" i18n>Submitted</span>
    </div>
  </nav>

  <mat-sidenav-container class="sidenav-container" autosize>
    <mat-sidenav [mode]="sidenavMode" class="sidenav" #sidenav [opened]="sidenavOpenDefault">
      <p class="sidenav-heading" i18n>Questions</p>
      <div class="question-grid">
        <div class="q-cell" *ngFor="let question of quizJson?.questions; let i = index"
          (click)="scroll(i + 1)"
          [ngClass]="{
            'q-cell--marked': isQuestionMarked(question?.questionId),
            'q-cell--attempted': !isQuestionMarked(question?.questionId) && isQuestionAttempted(question?.questionId),
            'q-cell--default': !isQuestionMarked(question?.questionId) && !isQuestionAttempted(question?.questionId)
          }">
          {{ i + 1 }}
        </div>
      </div>
    </mat-sidenav>

    <mat-sidenav-content class="quiz-content">
      <div class="questions-wrap">
        <ng-container *ngIf="!(viewState === 'answer' && quizJson?.isAssessment)">
          <viewer-question #questionsReference [id]="'question' + (i + 1)"
            *ngFor="let question of quizJson?.questions; let i = index"
            [markedQuestions]="markedQuestions"
            [artifactUrl]="artifactUrl"
            [questionNumber]="i + 1"
            [total]="quizJson?.questions.length"
            [viewState]="viewState"
            [question]="question"
            [itemSelectedList]="questionAnswerHash[(question?.questionId)]"
            (itemSelected)="fillSelectedItems(question, $event)">
          </viewer-question>
          <span *ngIf="!quizJson">Add Question to view here</span>
        </ng-container>

        <div class="results-card" *ngIf="viewState === 'review' || viewState === 'answer'">
          <div class="flex flex-center" *ngIf="fetchingResultsStatus === 'fetching'">
            <mat-spinner></mat-spinner>
          </div>
          <p class="results-error" *ngIf="fetchingResultsStatus === 'error'" i18n>Unable to Submit</p>
          <ng-container *ngIf="fetchingResultsStatus === 'done'">
            <p *ngIf="!quizJson.isAssessment" class="results-thanks" i18n>Thank you for your attempt.</p>
            <div class="results-row">
              <div class="results-stat">
                <span class="results-value">{{ numCorrectAnswers }}</span>
                <span class="results-label" i18n>Correct</span>
              </div>
              <div class="results-stat">
                <span class="results-value">{{ numIncorrectAnswers }}</span>
                <span class="results-label" i18n>Incorrect</span>
              </div>
              <div class="results-stat">
                <span class="results-value">{{ numUnanswered }}</span>
                <span class="results-label" i18n>Unanswered</span>
              </div>
              <div class="results-stat">
                <span class="results-value">{{ result | number: '1.0-0' }}<span class="results-pct">%</span></span>
                <span class="results-label" i18n>Score</span>
              </div>
            </div>
          </ng-container>
        </div>
      </div>
      <div id="quiz-end"></div>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
