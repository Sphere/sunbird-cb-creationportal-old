<mat-dialog-content>
  <div class="review-container">
    <h2 class="review-title" i18n>Review checklist</h2>
    <p class="review-desc" i18n>Answer a few questions about the content you just reviewed</p>
    <button class="review-btn review-btn--primary btn-font" (click)="submit('review')" i18n>
      Go to Review checklist
    </button>
    <button class="review-btn review-btn--outline btn-font" (click)="submit('skip')" i18n>
      Skip
    </button>
  </div>
</mat-dialog-content>
