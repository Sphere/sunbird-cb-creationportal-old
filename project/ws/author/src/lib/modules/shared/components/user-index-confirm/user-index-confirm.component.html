<mat-dialog-content class="txt-block">
  <span class="course-live">{{data.message}}</span>
</mat-dialog-content>
<div mat-dialog-actions class="button-block">
  <button class="noButtonColor" mat-stroked-button (click)="onCancel('current')">No</button>
  <button class="yesButtonColor" mat-raised-button (click)="onCancel('New')" cdkFocusInitial>Yes</button>
</div>
