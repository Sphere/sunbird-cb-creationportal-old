<!-- ── Dialog Header ────────────────────────────────────────────────────── -->
<div class="cp-header">
  <div class="cp-header-inner">
    <span class="cp-card-icon">
      <mat-icon>school</mat-icon>
    </span>
    <div>
      <p class="cp-title">Add Competency</p>
      <p class="cp-subtitle">Search, select a competency, then assign proficiency levels</p>
    </div>
  </div>
  <button mat-icon-button class="cp-close" [mat-dialog-close]="false" (click)="addCompetency(proficiency, null, false)" aria-label="Close">
    <mat-icon>close</mat-icon>
  </button>
</div>

<!-- ── Scrollable Content ────────────────────────────────────────────────── -->
<mat-dialog-content class="cp-content">
  <!-- Competency selector -->
  <div class="cp-section">
    <p class="cp-section-label">Competency</p>
    <mat-form-field appearance="outline" class="cp-field">
      <mat-label>Search by name or code...</mat-label>
      <input matInput [formControl]="competencyCtrl" [matAutocomplete]="compAuto" autocomplete="off" />
      <mat-autocomplete
        #compAuto="matAutocomplete"
        [displayWith]="displayCompetency"
        (opened)="onKey('')"
        (optionSelected)="eventSelection($event.option.value)"
      >
        <mat-option *ngFor="let list of proficiencyList" [value]="list">
          <span class="cp-opt-code">{{ list.code }}</span>
          {{ list.name }}
        </mat-option>
      </mat-autocomplete>
      <mat-hint>{{ proficiencyList?.length || 0 }} competencies</mat-hint>
    </mat-form-field>
  </div>

  <!-- Proficiency levels -->
  <div *ngIf="!disableLevel" class="cp-section">
    <p class="cp-section-label">Proficiency Level</p>
    <div class="cp-level-grid">
      <div
        *ngFor="let list of levelList; let i = index"
        class="cp-level-item"
        [class.cp-level-selected]="list.selected"
        [class.cp-level-existing]="list.alreadyAdded && list.selected"
      >
        <mat-checkbox [checked]="list.selected" (change)="listSelection(levelList, i, $event)" class="cp-checkbox">
          {{ list.name }}
        </mat-checkbox>
        <span *ngIf="list.alreadyAdded" class="cp-level-badge">Added</span>
      </div>
    </div>
  </div>
</mat-dialog-content>

<!-- ── Footer Actions ────────────────────────────────────────────────────── -->
<mat-dialog-actions class="cp-actions">
  <button mat-stroked-button class="cp-btn-cancel" [mat-dialog-close]="false" (click)="addCompetency(proficiency, null, false)">
    Cancel
  </button>
  <button
    mat-flat-button
    class="cp-btn-confirm"
    (click)="addCompetency(proficiency, null, true)"
    [disabled]="!(proficiency?.id && (hasOneChecked || disableLevel))"
  >
    Add Competency
  </button>
</mat-dialog-actions>
