name: Quality

# Enforces the project conventions on every PR so code that ignores the
# rules (ESLint) or doesn't compile can't be merged. See CLAUDE.md and
# .claude/skills/ for the conventions these checks back up.

# Runs on pull requests targeting main (the merge gate). Not on push to main —
# every change reaches main via a PR that's already checked, so a post-merge run
# would just be a duplicate.
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

# Cancel a previous in-flight run for the same PR when new commits are pushed,
# so we don't pile up duplicate runs.
concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # package-lock.json is gitignored and there is a known jest 29 vs 30
      # peer conflict, so a plain `npm ci` won't work — see CLAUDE.md §8.
      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund
      - name: ESLint (must have zero errors)
        run: npm run lint

  test:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 20 matches the runtime (Dockerfile) and the version the suite
          # was validated on; jest-preset-angular is happiest here.
          node-version: 20
      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund
      # Runs the full Jest suite and enforces the coverageThreshold ratchet in
      # jest.config.js — a PR that fails tests OR drops coverage below the floor
      # fails this job and cannot merge. Raise the threshold as coverage climbs.
      - name: Jest (tests + coverage gate)
        run: npm test -- --coverage --ci

  build:
    name: Production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund
      # No separate `npm run tailwind` step: `ng build` compiles src/styles/styles.scss
      # (incl. Tailwind via the Angular/postcss pipeline) itself — same as the prod
      # Dockerfile, which builds with `npm run build` alone. The old tailwind CLI step
      # both failed (it ran the CSS parser over SCSS) and wrote to an unused src/styles.scss.
      - name: Build (production)
        run: npm run build
