<section #fullScreenContainer class="pdf-container">
  <div class="pdf-nav-bar" *ngIf="widgetData?.hideControls">
    <button class="pdf-nav-btn"
      [disabled]="currentPage.value < 2"
      (click)="loadPageNum(currentPage.value - 1)"
      aria-label="previous page" i18n-aria-label>
      <mat-icon>chevron_left</mat-icon>
    </button>

    <div class="pdf-page-control">
      <span class="pdf-page-label" *ngIf="!isSmallViewPort" i18n>Page</span>
      <input type="number" class="pdf-page-input"
        [formControl]="currentPage"
        min="1"
        [max]="totalPages"
        aria-label="Page Number"
        i18n-aria-label>
      <span class="pdf-page-sep" i18n>of {{ totalPages }}</span>
    </div>

    <button class="pdf-nav-btn"
      [disabled]="currentPage.value >= totalPages"
      (click)="loadPageNum(currentPage.value + 1)"
      aria-label="next page" i18n-aria-label>
      <mat-icon>chevron_right</mat-icon>
    </button>

    <ws-widget-btn-fullscreen
      (fsState)="fullScreenState($event)"
      (click)="refresh()"
      [widgetData]="{ fsContainer: fullScreenContainer }">
    </ws-widget-btn-fullscreen>
  </div>

  <ng-container *ngIf="widgetData?.pdfUrl">
    <ngx-extended-pdf-viewer
      [src]="widgetData.pdfUrl"
      useBrowserLocale="true"
      [height]="getPDFHeight"
      [zoom]="getPDFZoom"
      [page]="currentPage.value"
      [showToolbar]="false"
      enablePinchOnMobile="true"
      (pageChange)="loadPageNum($event)"
      (pagesLoaded)="documentLoded($event)"
      [(sidebarVisible)]="sidebarOpen">
    </ngx-extended-pdf-viewer>
  </ng-container>
</section>
